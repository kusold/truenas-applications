app:
  name: backrest
  enabled: true
  compose: compose.yaml
  env_file: .env

icon:
  media_type: image/svg+xml
  base64: 

datasets:
  - dataset: tank/appdata/backrest/data
    compose_env: BACKREST_DATASET
  - dataset: tank/appdata/backrest/config
    compose_env: BACKREST_CONFIG_DATASET
  - dataset: tank/appdata/backrest/repos
    compose_env: BACKREST_REPOS_DATASET
  - dataset: tank/appdata/backrest/rclone
    compose_env: BACKREST_RCLONE_DATASET
  - dataset: tank/app-cache/backrest/cache
    compose_env: BACKREST_CACHE_DATASET
  - dataset: tank/app-cache/backrest/tmp
    compose_env: BACKREST_TMP_DATASET

portal:
  name: Web UI
  port: 9898
  scheme: http
  path: /

notes: |
  Backrest data, config, repos, and rclone config are under tank/appdata.
  Cache and tmp are under tank/app-cache so recursive backups can skip them.
  The /userdata mount is read-only and should point at the dataset or directory to back up.
