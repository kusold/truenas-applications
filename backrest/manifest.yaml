app:
  name: backrest
  enabled: true
  compose: compose.yaml
  env_file: .env

icon:
  media_type: image/svg+xml
  base64: 

datasets:
  - dataset: tank/red/Applications/backrest
    compose_env: BACKREST_DATASET
  - dataset: tank/red/Backups/backrest
    compose_env: BACKREST_REPOS_DATASET
  - dataset: tank/red/Replaceable/Application-Cache/backrest
    compose_env: BACKREST_CACHE_DATASET

portal:
  name: Web UI
  port: 9898
  scheme: http
  path: /

notes: |
  Backrest data, config, repos, and rclone config are under tank/appdata.
  Cache and tmp are under tank/app-cache so recursive backups can skip them.
  The /userdata mount is read-only and should point at the dataset or directory to back up.
